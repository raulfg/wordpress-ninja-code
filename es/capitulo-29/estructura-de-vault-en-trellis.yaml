# trellis/group_vars/production/wordpress_sites.yml

wordpress_sites:
  ejemplo.com:
    site_hosts:
      - canonical: ejemplo.com
        redirects:
          - www.ejemplo.com
    local_path: ../site
    repo: git@github.com:tu-usuario/ejemplo-com.git
    repo_subtree_path: ""
    branch: main
    env:
      db_name: ejemplo_com
      db_user: ejemplo_com
      db_password: "{{ vault_wordpress_sites['ejemplo.com']['env']['db_password'] }}"
      # WordPress keys from vault
      auth_key:         "{{ vault_wordpress_sites['ejemplo.com']['env']['auth_key'] }}"
      secure_auth_key:  "{{ vault_wordpress_sites['ejemplo.com']['env']['secure_auth_key'] }}"
      # ... resto de claves y salts

- name: Health check
  run: |
    HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://domain.com/)

    if [ "$HTTP_CODE" != "200" ]; then
      echo "Health check failed. HTTP code: $HTTP_CODE"
      echo "Starting automatic rollback..."

      # Restore the pre-deploy backup if it exists
      ssh -i /tmp/deploy_key ${{ secrets.PROD_USER }}@${{ secrets.PROD_HOST }} \
        "ls -t /var/backups/pre-deploy-*.sql | head -1 | xargs wp db import --allow-root"

      exit 1
    fi

    echo "Deployment completed. Site responding correctly."

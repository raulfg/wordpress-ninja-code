wordpress_sites:
  my-project.com:
    site_hosts:
      - canonical: my-project.com
        redirects:
          - www.my-project.com
    local_path: ../site
    repo: git@github.com:my-organization/my-project.git
    repo_subtree_path: web
    branch: main
    multisite:
      enabled: false
    ssl:
      enabled: true
      provider: letsencrypt
    cache:
      enabled: false

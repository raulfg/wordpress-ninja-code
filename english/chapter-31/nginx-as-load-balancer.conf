upstream wordpress_backend {
    # Round-robin by default
    server 10.0.1.10:80 weight=1;
    server 10.0.1.11:80 weight=1;
    server 10.0.1.12:80 weight=1;

    # Passive health check: remove from pool on failure
    max_fails=3 fail_timeout=30s;

    # Maintain keep-alive connections with the backend
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name ninjatheme.com;

    ssl_certificate     /etc/letsencrypt/live/ninjatheme.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ninjatheme.com/privkey.pem;

    location / {
        proxy_pass http://wordpress_backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# Nginx: aceptar cualquier dominio y pasarlo a WordPress
server {
    listen 443 ssl;
    server_name _;  # Cualquier dominio no coincidente con otro bloque

    root /var/www/html;
    index index.php;

    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
}
